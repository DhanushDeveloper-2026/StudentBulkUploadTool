<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentDataExcel</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f8f9fa;
            font-family:Arial, Helvetica, sans-serif;
        }

        /* Navbar */
        .custom-navbar{
            background:linear-gradient(90deg,#0d6efd ,#0d6efd );
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        .navbar-brand{
            color:#fff !important;
            font-size:1.6rem;
            font-weight:700;
            letter-spacing:.5px;
        }

        .navbar-brand span{
            color:#ffd43b;
        }

        .btn-login{
            color:#fff;
            border:2px solid #fff;
            border-radius:30px;
            padding:8px 22px;
            font-weight:500;
            transition:.3s;
        }

        .btn-login:hover{
            background:#fff;
            color: black;
        }

        .btn-register{
            color:#fff;
            border:2px solid #fff;
            border-radius:30px;
            padding:8px 22px;
            font-weight:500;
            transition:.3s;
        }

        .btn-register:hover{
            background:#fff;
            color: black;
        }

        .navbar-toggler{
            border:none;
        }

        .navbar-toggler:focus{
            box-shadow:none;
        }

        @media (max-width:991px){

            .btn-login,
            .btn-register{
                display:block;
                width:100%;
                text-align:center;
                margin-top:10px;
            }

        }

    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top">

        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand" href="#">
                🎓 <span>Student</span> DataExcel
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler bg-light"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Right Menu -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <div class="ms-auto d-lg-flex align-items-center">

                    {% if not user.is_authenticated %}
                    <a href="{% url 'login' %}" class="btn btn-login btn-outline-light me-lg-3 rounded-3">
                        Login
                    </a>

                    <a href="{% url 'register' %}" class="btn btn-register  btn-outline-light">
                        Register
                    </a>

                    {% else %}
                    <a href="{% url 'logout' %}" class="btn btn-outline-light fw-semibold rounded-pill">
                        Logout</a>
                    {% endif %}
                </div>

            </div>

        </div>

    </nav>

    <!-- Your Page Content Starts Here -->



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
