{% extends 'base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow border-0" style="max-width: 550px; width: 100%;">
        <div class="card-body text-center p-5">

            <div class="mb-4">
                <i class="bi bi-envelope-check-fill text-success" style="font-size: 4rem;"></i>
            </div>

            <h2 class="fw-bold mb-3">
                Check Your Email
            </h2>

            <p class="text-muted mb-4">
                We've sent a password reset link to your registered email address.
                Please check your inbox and follow the instructions to create a new password.
            </p>

            <p class="text-muted small mb-0">
                If you don't see the email, please check your spam or junk folder.
            </p>

        </div>
    </div>

</div>

{% endblock %}
